name: Deploy → Test (Single) → Allure

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:

# -------------------------------
# 1️⃣ Deploy Website FIRST
# -------------------------------
  deploy-site:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy website to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./sample-site
          publish_branch: gh-pages

# -------------------------------
# 2️⃣ Run ONLY ONE TEST + Allure
# -------------------------------
  test-and-report:
    needs: deploy-site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      # ✅ Chromium only
      - name: Install Chromium
        run: npx playwright install chromium

      # -------------------------------
      # ⏳ Wait until site is LIVE
      # -------------------------------
      - name: Wait for site
        run: |
          echo "Waiting for site..."
          for i in {1..15}; do
            if curl -s https://sandeeprangu68.github.io/playwright/ | grep -q "Welcome to Test App"; then
              echo "Site is LIVE ✅"
              break
            fi
            sleep 5
          done

      # -------------------------------
      # 🔥 CLEAN OLD RESULTS (VERY IMPORTANT)
      # -------------------------------
      - name: Clean old Allure results
        run: rm -rf allure-results allure-report

      # -------------------------------
      # 🧪 RUN ONLY ONE TEST
      # -------------------------------
      - name: Run Playwright test (single file)
        run: npx playwright test tests/homepage.spec.js --project=chromium
        continue-on-error: true

      # -------------------------------
      # 📊 ALLURE REPORT
      # -------------------------------
      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Generate Allure Report
        run: allure generate allure-results --clean -o allure-report

      # -------------------------------
      # 📥 Pull existing gh-pages content
      # -------------------------------
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      # -------------------------------
      # 🔁 Merge report under /allure
      # -------------------------------
      - name: Merge Allure report
        run: |
          mkdir -p gh-pages/allure
          cp -r allure-report/* gh-pages/allure/

      # -------------------------------
      # 🚀 Deploy final (site + report)
      # -------------------------------
      - name: Deploy merged content
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh-pages
          publish_branch: gh-pages
