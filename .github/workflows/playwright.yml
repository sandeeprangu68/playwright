name: Deploy → Test (Single) → Allure CLEAN

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:

  deploy-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy website
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./sample-site
          publish_branch: gh-pages

  test-and-report:
    needs: deploy-site
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm ci

      - name: Install Chromium
        run: npx playwright install chromium

      # wait for site
      - name: Wait for site
        run: |
          for i in {1..15}; do
            if curl -s https://sandeeprangu68.github.io/playwright/ | grep -q "Welcome to Test App"; then
              echo "LIVE"
              break
            fi
            sleep 5
          done

      # clean everything
      - name: Clean old data
        run: rm -rf allure-results allure-report

      # run ONLY one test
      - name: Run test
        run: npx playwright test tests/homepage.spec.js --project=chromium

      - name: Install Allure
        run: npm install -g allure-commandline

      - name: Generate report
        run: allure generate allure-results --clean -o allure-report

      # 🔥 DIRECT deploy (NO merge, NO history)
      - name: Deploy report (clean)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
          destination_dir: allure
