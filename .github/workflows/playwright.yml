name: Deploy Site → Test → Allure Report

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:

  # -------------------------------
  # 🚀 JOB 1: Deploy Website FIRST
  # -------------------------------
  deploy-site:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy website to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./sample-site
          publish_branch: gh-pages


  # ----------------------------------------
  # 🧪 JOB 2: Run Tests AFTER deployment
  # ----------------------------------------
  test-and-report:
    runs-on: ubuntu-latest
    needs: deploy-site   # 🔥 IMPORTANT (runs only after site deploy)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      # ✅ Chrome only
      - name: Install Chromium
        run: npx playwright install chromium --with-deps

      # ⏳ Wait until site is LIVE
      - name: Wait for GitHub Pages site
        run: |
          echo "Waiting for site to be live..."
          for i in {1..15}; do
            if curl -s https://sandeeprangu68.github.io/playwright/ | grep "Welcome"; then
              echo "Site is live!"
              break
            fi
            sleep 5
          done

      # 🧪 Run tests
      - name: Run Playwright tests
        run: npx playwright test --project=chromium
        env:
          BASE_URL: https://sandeeprangu68.github.io/playwright/
        continue-on-error: true

      # 📦 Install Allure
      - name: Install Allure CLI
        run: npm install -g allure-commandline

      # 📊 Generate report
      - name: Generate Allure Report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      # 🚀 Deploy ONLY report (inside /allure folder)
      - name: Publish Allure report
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          destination_dir: allure   # 🔥 IMPORTANT (no overwrite)
          publish_branch: gh-pages
