name: Playwright Tests with Allure

on:
  push:
    branches: [ master ]

  # Manual trigger with input (BEST PRACTICE)
  workflow_dispatch:
    inputs:
      spec:
        description: "Test file or folder to run"
        required: false
        default: "tests/homepage.spec.js"

      env:
        description: "Environment (qa/dev)"
        required: false
        default: "qa"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # 🔥 Run selected test dynamically
      - name: Run Playwright tests
        run: npx playwright test ${{ github.event.inputs.spec }}
        env:
          ENV: ${{ github.event.inputs.env }}

      # Install Allure CLI
      - name: Install Allure CLI
        run: npm install -g allure-commandline

      # Generate Allure report
      - name: Generate Allure Report
        run: allure generate allure-results --clean -o allure-report

      # Upload report as artifact
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
