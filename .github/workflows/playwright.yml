name: Deploy → Test → Allure

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:

  # -------------------------------
  # 🚀 JOB 1: DeployWebsite FIRST
  # -------------------------------
  deploy-site:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy website to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./sample-site
          publish_branch: gh-pages
          force_orphan: true   # ensures clean site deploy


  # ----------------------------------------
  # 🧪 JOB 2: Test AFTER deployment
  # ----------------------------------------
  test-and-report:
    runs-on: ubuntu-latest
    needs: deploy-site

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      # ✅ Install Chrome only
      - name: Install Chromium
        run: npx playwright install chromium --with-deps

      # 🔥 Robust wait (real fix for your issue)
      - name: Wait for GitHub Pages to be LIVE
        run: |
          echo "Waiting for site..."

          for i in {1..25}; do
            STATUS=$(curl -s -o response.html -w "%{http_code}" https://sandeeprangu68.github.io/playwright/)

            if [ "$STATUS" = "200" ] && grep -q "Welcome to Test App" response.html; then
              echo "✅ Site is LIVE"
              break
            fi

            echo "⏳ Not ready yet..."
            sleep 5
          done

      # 🧪 Run tests
      - name: Run Playwright tests
        run: npx playwright test tests/homepage.spec.js --project=chromium
        env:
          BASE_URL: https://sandeeprangu68.github.io/playwright/
        continue-on-error: true

      # 📦 Install Allure
      - name: Install Allure CLI
        run: npm install -g allure-commandline

      # 📊 Generate report
      - name: Generate Allure Report
        run: allure generate allure-results --clean -o allure-report

      # 🔥 Pull existing gh-pages content
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      # 🔥 Merge report into existing site (NO overwrite)
      - name: Merge Allure report into site
        run: |
          mkdir -p gh-pages/allure
          cp -r allure-report/* gh-pages/allure/

      # 🚀 Push final merged content
      - name: Deploy updated gh-pages (site + report)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
          publish_branch: gh-pages
