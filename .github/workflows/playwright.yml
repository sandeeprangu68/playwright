name: Playwright Tests with Allure

on:
  push:
    branches: [ master ]

  workflow_dispatch:
    inputs:
      spec:
        description: "Test file or folder to run"
        required: false
        default: "tests/homepage.spec.js"

      env:
        description: "Environment (qa/dev)"
        required: false
        default: "qa"

# 🔥 ADD THIS
permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test ${{ github.event.inputs.spec || 'tests/homepage.spec.js' }}
        env:
          ENV: ${{ github.event.inputs.env || 'qa' }}
        continue-on-error: true

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Generate Allure Report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Deploy Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
