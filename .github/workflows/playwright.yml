name: Playwright Tests + Allure + Website Deploy

on:
  push:
    branches: [ master ]

  workflow_dispatch:
    inputs:
      spec:
        description: "Test file or folder to run"
        required: false
        default: "tests/homepage.spec.js"

      env:
        description: "Environment (qa/dev)"
        required: false
        default: "qa"

# 🔥 Required for gh-pages push
permissions:
  contents: write

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # ✅ Install dependencies
      - name: Install dependencies
        run: npm ci

      # ✅ Install Playwright browsers
      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # 🔥 Clean old results
      - name: Clean old Allure results
        run: rm -rf allure-results allure-report

      # 🔥 Run tests (don't break pipeline)
      - name: Run Playwright tests
        run: npx playwright test ${{ github.event.inputs.spec || 'tests/homepage.spec.js' }}
        env:
          ENV: ${{ github.event.inputs.env || 'qa' }}
        continue-on-error: true

      # ✅ Install Allure CLI
      - name: Install Allure CLI
        run: npm install -g allure-commandline

      # 🔥 Pull previous report (for history)
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      # 🔥 Copy history (trend graph)
      - name: Copy Allure history
        run: |
          if [ -d "gh-pages/history" ]; then
            mkdir -p allure-results/history
            cp -r gh-pages/history/* allure-results/history/
          fi

      # ✅ Add environment info
      - name: Add environment info
        run: |
          mkdir -p allure-results
          echo "ENV=${{ github.event.inputs.env || 'qa' }}" >> allure-results/environment.properties
          echo "BROWSER=chromium" >> allure-results/environment.properties
          echo "OS=ubuntu-latest" >> allure-results/environment.properties

      # ✅ Generate Allure report
      - name: Generate Allure Report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      # 🚀 Deploy Allure report → gh-pages
      - name: Deploy Allure report
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
          force_orphan: true

      # 🌐 Deploy website → gh-pages-site (SEPARATE BRANCH)
      - name: Deploy Website
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./sample-site
          publish_branch: gh-pages-site
