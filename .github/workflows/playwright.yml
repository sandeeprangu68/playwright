name: Deploy → Test → Allure

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:

# -------------------------------
# 1️⃣ Deploy Website FIRST
# -------------------------------
  deploy-site:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy website to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./sample-site   # 👈 your website folder
          publish_branch: gh-pages
          # ❌ DO NOT use force_orphan

# -------------------------------
# 2️⃣ Run Tests AFTER Deployment
# -------------------------------
  test-and-report:
    needs: deploy-site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      # ✅ Chrome only
      - name: Install Chromium
        run: npx playwright install chromium

      # -------------------------------
      # ⏳ Wait until site is LIVE
      # -------------------------------
      - name: Wait for GitHub Pages site
        run: |
          echo "Waiting for site to be live..."
          for i in {1..15}; do
            if curl -s https://sandeeprangu68.github.io/playwright/ | grep -q "Welcome to Test App"; then
              echo "Site is LIVE ✅"
              break
            fi
            echo "Retrying in 5s..."
            sleep 5
          done

      # -------------------------------
      # 🧪 Run tests
      # -------------------------------
      - name: Run Playwright tests
        run: npx playwright test --project=chromium
        continue-on-error: true

      # -------------------------------
      # 📊 Generate Allure Report
      # -------------------------------
      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Generate Allure Report
        run: allure generate allure-results --clean -o allure-report

      # -------------------------------
      # 📥 Pull existing gh-pages content
      # -------------------------------
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      # -------------------------------
      # 🔁 Merge report into site (IMPORTANT)
      # -------------------------------
      - name: Merge Allure report into site
        run: |
          mkdir -p gh-pages/allure
          cp -r allure-report/* gh-pages/allure/

      # -------------------------------
      # 🚀 Deploy updated site + report
      # -------------------------------
      - name: Deploy merged content
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh-pages
          publish_branch: gh-pages
