name: Deploy Website + Run Playwright + Allure (Chromium Only)

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:

  # 🌐 STEP 1: Deploy Website FIRST
  deploy-site:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy website to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./sample-site
          publish_branch: gh-pages-site

  # 🧪 STEP 2: Run tests AFTER deploy
  test-and-report:
    needs: deploy-site   # 🔥 important
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium only
        run: npx playwright install chromium --with-deps

      # ⏳ WAIT until site is live
      - name: Wait for site to be live
        run: |
          echo "Waiting for site..."
          for i in {1..10}; do
            curl -s https://sandeeprangu68.github.io/playwright-site/ && break
            sleep 5
          done

      - name: Clean old results
        run: rm -rf allure-results allure-report

      # 🔥 Run tests on deployed URL
      - name: Run Playwright tests (Chromium)
        run: npx playwright test tests/homepage.spec.js --project=chromium
        env:
          BASE_URL: https://sandeeprangu68.github.io/playwright-site/
        continue-on-error: true

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      # 📊 Generate report
      - name: Generate Allure Report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      # 🚀 Deploy Allure report
      - name: Deploy Allure report
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
