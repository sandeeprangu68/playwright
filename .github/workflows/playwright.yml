name: Deploy → Test → Allure

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:

  # 🌐 1️⃣ Deploy your sample website
  deploy-site:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy website to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./sample-site
          publish_branch: gh-pages-site

  # 🧪 2️⃣ Run tests AFTER deployment
  test:
    needs: deploy-site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Wait for site to be live
        run: sleep 20

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Clean old Allure data
        run: rm -rf allure-results allure-report

      - name: Run Playwright tests
        run: npx playwright test tests/homepage.spec.js
        env:
          BASE_URL: https://sandeeprangu68.github.io/playwright/

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

  # 📊 3️⃣ Generate & publish Allure report + Email
  report:
    needs: test
    if: always()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Generate Allure report
        run: allure generate allure-results --clean -o allure-report

      - name: Deploy Allure report
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages

      # 📧 Email Notification Step
      - name: Send Allure Report Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Playwright Report - ${{ job.status }}"
          to: your_email@gmail.com
          from: your_email@gmail.com
          html_body: |
            <h2>Playwright Test Execution Completed</h2>

            <p>Status: <b>${{ job.status }}</b></p>

            <p>Allure Report:</p>
            <a href="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/">
              View Report
            </a>

            <p>GitHub Run Details:</p>
            <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">
              View Run
            </a>
